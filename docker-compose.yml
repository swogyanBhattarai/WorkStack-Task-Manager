services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    container_name: backend
    volumes:
      - workstack-data:/data

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    container_name: frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend

volumes:
  workstack-data: